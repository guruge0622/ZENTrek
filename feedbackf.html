<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital@1&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <title>Feedback | ZENTrek</title>

    <style>
        /* Reset and Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('13.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        

        /* Container Styling */
        .container {
            width: 100%;
            max-width: 600px;
            background:transparent;
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px) brightness(50%);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 15px;
        
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #fff;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 1em;
            transition: border-color 0.3s;
            border-bottom: 2px solid #fff;
        }

        input:focus,
        textarea:focus {
            border-color: #afa04c;
            outline: none;
        }

        textarea {
            resize: vertical;
            
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #b8a157;
        }

        /* Rating Box Styling */
        .rating-box {
            text-align: center;
            margin: 20px 0;
        }

        .rating-box h3 {
            margin-bottom: 15px;
            color: #c4bebe81;
        }

        .star-rating {
            display: flex;
            justify-content: center;
            gap: 5px;
            font-size: 2rem;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            cursor: pointer;
            color: #ddd;
            transition: color 0.3s;
        }

        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffc107;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
        }

    .home {
    font-size: 0.9em;
    color: #fff;
    text-align: center;
    margin: 25px 0 10px;
    }

    .home p a {
    text-decoration: none;
    color: rgba(221, 188, 79, 0.637);
    font-weight: 600;
}
    </style>
    
</head>

<body>
    


    <div class="container">
        <h1>Feedback Form</h1>
        <form action="submit_feedback.php" method="post">
            <!-- Name Input -->
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
                
            </div>

            <!-- Email Input -->
            <div class="form-group">
                <label for="name">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Feedback Textarea -->
            <div class="form-group">
                <label for="name">Feedback:</label>
                <textarea id="feedback" name="feedback" rows="5" placeholder="Enter your feedback here..." required></textarea>
            </div>

            <!-- Star Rating Section -->
            <div class="rating-box">
                <h3>How Was Your Experience?</h3>
                <div class="star-rating">
                    <input type="radio" id="star1" name="rating" value="1">
                    <label for="star1" title="1 stars">★</label>

                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2" title="2 stars">★</label>

                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3" title="3 stars">★</label>

                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4" title="4 stars">★</label>

                    <input type="radio" id="star5" name="rating" value="5">
                    <label for="star5" title="5 star">★</label>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit">Submit Your Feedback</button>

            <div class="home">
                <p>Back to the Home <a href="Home.html"><b>Home</b></a> </p>
        </form>
    </div>
   



</body>

</html>
